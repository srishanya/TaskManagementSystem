{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><a href="{% url 'projects:project_detail' project.pk %}" class="text-decoration-none text-dark">{{ project.name }}</a> / Calendar</h2>
    <a href="{% url 'tasks:task_create' %}?project={{ project.pk }}" class="btn btn-primary">Add Task</a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <div id="calendar"></div>
    </div>
</div>

<!-- FullCalendar Integration -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    
    // Parse the events JSON passed from view
    var eventsData = JSON.parse('{{ events_json|escapejs }}');
    
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        events: eventsData,
        eventClick: function(info) {
            if (info.event.url) {
                window.location.href = info.event.url;
                info.jsEvent.preventDefault();
            }
        },
        height: 'auto',
        themeSystem: 'bootstrap5'
    });
    
    calendar.render();
});
</script>

<style>
    #calendar {
        min-height: 600px;
    }
    .fc-event {
        cursor: pointer;
    }
</style>
{% endblock %}
